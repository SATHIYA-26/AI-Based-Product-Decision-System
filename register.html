<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | Voice2Value</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#135bec",
                "background-light": "#f6f6f8",
                "background-dark": "#101622",
              },
              fontFamily: {
                "display": ["Manrope", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .bg-voice-pattern {
            background-color: #f6f6f8;
            background-image: radial-gradient(circle at 2px 2px, rgba(19, 91, 236, 0.05) 1px, transparent 0);
            background-size: 32px 32px;
        }
        input[type="password"]::placeholder {
            -webkit-text-security: none;
            opacity: 1;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden bg-voice-pattern dark:bg-none">
<div class="absolute inset-0 z-0 pointer-events-none opacity-40 overflow-hidden">
<svg class="absolute bottom-0 left-0 w-full" fill="none" viewbox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg">
<path d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,144C672,139,768,181,864,181.3C960,181,1056,139,1152,122.7L1248,107,1344,117,1392,122.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z" fill="#135bec" fill-opacity="0.05"></path>
</svg>
</div>
<div class="layout-container flex h-full grow flex-col z-10">
<header class="flex items-center justify-between whitespace-nowrap px-6 md:px-10 py-4 max-w-[1200px] mx-auto w-full">
<div class="flex items-center gap-3 text-slate-900 dark:text-slate-100">
<div class="size-8 text-primary">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M42.4379 44C42.4379 44 36.0744 33.9038 41.1692 24C46.8624 12.9336 42.2078 4 42.2078 4L7.01134 4C7.01134 4 11.6577 12.932 5.96912 23.9969C0.876273 33.9029 7.27094 44 7.27094 44L42.4379 44Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-xl font-bold leading-tight tracking-tight">Voice2Value</h2>
</div>
<div>
<a href="login.html" class="inline-flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-10 px-6 bg-primary/10 text-primary text-sm font-bold transition-all hover:bg-primary/20">
                        Sign In
                    </a>
</div>
</header>
<main class="flex-1 flex items-center justify-center p-4">
<div class="w-full max-w-[440px] bg-white dark:bg-slate-900 shadow-xl rounded-xl border border-slate-200 dark:border-slate-800 overflow-hidden">
<div class="p-8">
<div class="text-center mb-8">
<h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-2">Create Account</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Get started with Voice2Value</p>
</div>
<form class="space-y-5" id="register-form" action="/register" method="POST">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100" placeholder="Your name" type="text" name="fullName" required autocomplete="name"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100" placeholder="name@company.com" type="email" name="email" required autocomplete="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">lock</span>
<input class="password-input w-full pl-10 pr-12 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100" placeholder="Enter your password" type="password" name="password" required autocomplete="new-password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors" type="button" aria-label="Toggle password visibility">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">lock</span>
<input class="password-input w-full pl-10 pr-12 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100" placeholder="Confirm your password" type="password" name="confirmPassword" required autocomplete="new-password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors" type="button" aria-label="Toggle password visibility">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
<p id="password-mismatch" class="text-xs text-red-500 mt-1 hidden">Passwords do not match.</p>
</div>
<button class="w-full py-3 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<div class="bg-slate-50 dark:bg-slate-800/50 p-6 text-center border-t border-slate-100 dark:border-slate-800 mt-6">
<p class="text-sm text-slate-500 dark:text-slate-400">
                            Already have an account?
                            <a class="text-primary font-bold hover:underline ml-1" href="login.html">Sign In</a>
</p>
</div>
</div>
</main>
<footer class="p-6 text-center">
<p class="text-xs text-slate-400 dark:text-slate-600">
                    © 2024 Voice2Value AI. All rights reserved.
                    <span class="mx-2">|</span>
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span class="mx-2">|</span>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
</p>
</footer>
</div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const passwordInputs = document.querySelectorAll('input[type="password"]');
    
    passwordInputs.forEach(function(input) {
        const toggleButton = input.nextElementSibling;
        const toggleIcon = toggleButton.querySelector('span');
        
        toggleButton.addEventListener('click', function() {
            if (input.type === 'password') {
                input.type = 'text';
                toggleIcon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                toggleIcon.textContent = 'visibility';
            }
        });
    });
});

document.getElementById('register-form').addEventListener('submit', function(e) {
    var pwd = document.querySelector('input[name="password"]').value;
    var confirm = document.querySelector('input[name="confirmPassword"]').value;
    var msg = document.getElementById('password-mismatch');
    if (pwd !== confirm) {
        e.preventDefault();
        msg.classList.remove('hidden');
        return false;
    }
    msg.classList.add('hidden');
});
</script>
</body></html>
