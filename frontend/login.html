<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | Voice2Value</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#135bec",
                "background-light": "#f6f6f8",
                "background-dark": "#101622",
              },
              fontFamily: {
                "display": ["Manrope", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .bg-voice-pattern {
            background-color: #f6f6f8;
            background-image: radial-gradient(circle at 2px 2px, rgba(19, 91, 236, 0.05) 1px, transparent 0);
            background-size: 32px 32px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden bg-voice-pattern dark:bg-none">
<!-- Subtle Wave Background Overlay -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-40 overflow-hidden">
<svg class="absolute bottom-0 left-0 w-full" fill="none" viewbox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg">
<path d="M0,160L48,176C96,192,192,224,288,213.3C384,203,480,149,576,144C672,139,768,181,864,181.3C960,181,1056,139,1152,122.7C1248,107,1344,117,1392,122.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z" fill="#135bec" fill-opacity="0.05"></path>
</svg>
</div>
<!-- Main Layout Container -->
<div class="layout-container flex h-full grow flex-col z-10">
<!-- Top Navigation -->
<header class="flex items-center justify-between whitespace-nowrap px-6 md:px-10 py-4 max-w-[1200px] mx-auto w-full">
<div class="flex items-center gap-3 text-slate-900 dark:text-slate-100">
<div class="size-8 text-primary">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path d="M42.4379 44C42.4379 44 36.0744 33.9038 41.1692 24C46.8624 12.9336 42.2078 4 42.2078 4L7.01134 4C7.01134 4 11.6577 12.932 5.96912 23.9969C0.876273 33.9029 7.27094 44 7.27094 44L42.4379 44Z" fill="currentColor"></path>
</svg>
</div>
<h2 class="text-xl font-bold leading-tight tracking-tight">Voice2Value</h2>
</div>
<div>
<span class="text-sm text-slate-600 dark:text-slate-400 mr-4 hidden md:inline">New to Voice2Value?</span>
<a href="register.html" class="inline-flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-10 px-6 bg-primary/10 text-primary text-sm font-bold transition-all hover:bg-primary/20">
                        Sign Up
                    </a>
</div>
</header>
<!-- Login Section -->
<main class="flex-1 flex items-center justify-center p-4">
<div class="w-full max-w-[440px] bg-white dark:bg-slate-900 shadow-xl rounded-xl border border-slate-200 dark:border-slate-800 overflow-hidden">
<div class="p-8">
<div class="text-center mb-8">
<h1 class="text-2xl font-bold text-slate-900 dark:text-slate-100 mb-2">Welcome Back</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Unlock insights from every word</p>
</div>
<!-- Login Form -->
<form class="space-y-5" id="login-form" action="/login" method="POST">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100" placeholder="name@company.com" type="email" name="email" required/>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center ml-1">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Password</label>
<a class="text-xs font-bold text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100" placeholder="Enter your password" type="password" name="password" required/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="flex items-center gap-2 px-1">
<input class="w-4 h-4 text-primary rounded border-slate-300 focus:ring-primary cursor-pointer" id="remember" name="remember" type="checkbox"/>
<label class="text-xs text-slate-600 dark:text-slate-400 cursor-pointer" for="remember">Remember me for 30 days</label>
</div>
<button class="w-full py-3 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-slate-200 dark:border-slate-700"></span>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-slate-900 px-4 text-slate-500 font-medium">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-2.5 px-4 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-all text-sm font-semibold text-slate-700 dark:text-slate-300">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                                Google
                            </button>
<button class="flex items-center justify-center gap-2 py-2.5 px-4 border border-slate-200 dark:border-slate-700 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-800 transition-all text-sm font-semibold text-slate-700 dark:text-slate-300">
<svg class="w-5 h-5" viewbox="0 0 23 23" xmlns="http://www.w3.org/2000/svg">
<path d="M0 0h23v23H0z" fill="#f3f3f3"></path>
<path d="M1 1h10v10H1z" fill="#f35325"></path>
<path d="M12 1h10v10H12z" fill="#81bc06"></path>
<path d="M1 12h10v10H1z" fill="#05a6f0"></path>
<path d="M12 12h10v10H12z" fill="#ffba08"></path>
</svg>
                                Microsoft
                            </button>
</div>
</div>
<div class="bg-slate-50 dark:bg-slate-800/50 p-6 text-center border-t border-slate-100 dark:border-slate-800">
<p class="text-sm text-slate-500 dark:text-slate-400">
                            Don't have an account?
                            <a class="text-primary font-bold hover:underline ml-1" href="register.html">Create Account</a>
</p>
</div>
</div>
</main>
<!-- Footer -->
<footer class="p-6 text-center">
<p class="text-xs text-slate-400 dark:text-slate-600">
                    &copy; 2024 Voice2Value AI. All rights reserved.
                    <span class="mx-2">|</span>
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<span class="mx-2">|</span>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
</p>
</footer>
</div>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const passwordInput = document.querySelector('input[name="password"]');
    const toggleButton = passwordInput.nextElementSibling;
    const toggleIcon = toggleButton.querySelector('span');
    
    toggleButton.addEventListener('click', function() {
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.textContent = 'visibility_off';
        } else {
            passwordInput.type = 'password';
            toggleIcon.textContent = 'visibility';
        }
    });
});
</script>
</body></html>
